<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in…</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      font-size: 14px;
    }
    .error { color: #c00; text-align: center; max-width: 400px; padding: 24px; }
  </style>
</head>
<body>
  <p>Completing sign-in…</p>
  <div class="error" id="error" hidden></div>

  <script type="module">
    import { loadEnvFile } from './js/coralogix/config.js';
    import { handleOAuthCallback, getAllowedTeams, setSelectedTeamId } from './js/coralogix/auth.js';

    (async () => {
      try {
        await loadEnvFile();
        const returnUrl = await handleOAuthCallback();
        if (!returnUrl) return; // state mismatch — already redirecting

        // Auto-select the first available team; user can switch via the header dropdown
        const teams = getAllowedTeams();
        if (teams.length > 0) {
          setSelectedTeamId(teams[0].team_id);
        }

        window.location.replace(returnUrl);
      } catch (err) {
        document.querySelector('p').hidden = true;
        const el = document.getElementById('error');
        el.textContent = err.message || 'Sign-in failed. Please close this tab and try again.';
        el.hidden = false;
      }
    })();
  </script>
</body>
</html>
