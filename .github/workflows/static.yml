# Deploy static content to GCS and Azure
name: Deploy static content

on:
  push:
    branches: ["main", "cx-source"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # Deploy to GCS (primary)
  deploy-gcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Deploy to GCS
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          if [ "${{ github.ref_name }}" = "cx-source" ]; then
            DEST="gs://klickhaus-static/cx"
          else
            DEST="gs://klickhaus-static"
          fi
          gsutil -m rsync -r -d \
            -x 'node_modules/|\.git/|\.github/|debug/|hars/|scripts/|\.claude/|\.yolo/|.*\.local\.md|\.env.*|package-lock\.json|screenshot\.png|.*\.test\.js|eslint\.config\.js|knip\.json|\.jscpd\.json|\.releaserc\.json|renovate\.json|\.gitignore|AGENTS\.md|VIEW_MIGRATION\.md|CLAUDE\.md|README\.md' \
            . $DEST

      - name: Invalidate CDN cache
        run: |
          if [ "${{ github.ref_name }}" = "cx-source" ]; then
            INVALIDATE_PATH="/cx/*"
          else
            INVALIDATE_PATH="/*"
          fi
          gcloud compute url-maps invalidate-cdn-cache klickhaus-lb \
            --path "$INVALIDATE_PATH" \
            --project helix-225321 \
            --async

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/gcp-key.json

  # Deploy to Azure Static Web Apps (backup) - main branch only
  deploy-azure:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    name: Deploy to Azure
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          skip_app_build: true
          skip_api_build: true
